---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  labels:
    app.kubernetes.io/name: network-services-operator
    app.kubernetes.io/component: extension-server
    app.kubernetes.io/managed-by: kustomize
  name: extension-server-eg-client-tls
  namespace: system
spec:
  secretName: extension-server-eg-client-tls   # fixed; cert-manager-managed, NOT kustomize-prefixed
  duration: 8760h
  renewBefore: 720h
  commonName: envoy-gateway
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    # Placeholder — an overlay must patch this issuer.
    name: placeholder-issuer
    kind: ClusterIssuer
    group: cert-manager.io
  usages:
    - digital signature
    - key encipherment
    - client auth

---
# EG mTLS client certificate — EG presents this when connecting to the extension server.
# Referenced by extensionManager.service.tls.clientCertificateRef in the downstream EG config.
#
# Secret lives in NSO's namespace. EG reads it cross-namespace via SecretObjectReference
# (EG v1.8.1 uses a cluster-scoped client; no ReferenceGrant required).
#
# Issued by the platform's datum-control-plane ClusterIssuer (cert-manager).
# secretName is NOT kustomize-prefixed; must match the clientCertificateRef name.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  labels:
    app.kubernetes.io/name: network-services-operator
    app.kubernetes.io/component: extension-server
    app.kubernetes.io/managed-by: kustomize
  name: extension-server-eg-client-tls
  namespace: system
spec:
  secretName: extension-server-eg-client-tls   # fixed; cert-manager-managed, NOT kustomize-prefixed
  duration: 8760h
  renewBefore: 720h
  commonName: envoy-gateway
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: datum-control-plane
    kind: ClusterIssuer
    group: cert-manager.io
  usages:
    - digital signature
    - key encipherment
    - client auth

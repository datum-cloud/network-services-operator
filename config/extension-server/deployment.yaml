apiVersion: apps/v1
kind: Deployment
metadata:
  name: envoy-gateway-extension-server
  namespace: system
  labels:
    app.kubernetes.io/name: network-services-operator
    app.kubernetes.io/component: envoy-gateway-extension-server
    app.kubernetes.io/managed-by: kustomize
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      # With failOpen: false, 0 serving replicas freezes xDS fleet-wide.
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: network-services-operator
      app.kubernetes.io/component: envoy-gateway-extension-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: network-services-operator
        app.kubernetes.io/component: envoy-gateway-extension-server
    spec:
      serviceAccountName: envoy-gateway-extension-server
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/component: envoy-gateway-extension-server
      containers:
        - name: envoy-gateway-extension-server
          image: ghcr.io/datum-cloud/network-services-operator:latest
          imagePullPolicy: IfNotPresent
          command:
            - /network-services
            - envoy-gateway-extension-server
          args:
            - --grpc-addr=:5005
            - --health-addr=:8080
            - --tls-cert=/tls/tls.crt
            - --tls-key=/tls/tls.key
            - --tls-client-ca=/tls-ca/ca.crt
          ports:
            - name: grpc
              containerPort: 5005
              protocol: TCP
            - name: health
              containerPort: 8080
              protocol: TCP
          # 60×5s startup window covers informer cache sync before liveness starts.
          startupProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: "1"
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          lifecycle:
            preStop:
              sleep:
                seconds: 5
          volumeMounts:
            - name: tls
              mountPath: /tls
              readOnly: true
            - name: tls-ca
              mountPath: /tls-ca
              readOnly: true
      terminationGracePeriodSeconds: 20
      volumes:
        # issuer-name and dns-names are placeholders — an overlay must patch them.
        - name: tls
          csi:
            driver: csi.cert-manager.io
            readOnly: true
            volumeAttributes:
              csi.cert-manager.io/issuer-kind: ClusterIssuer
              csi.cert-manager.io/issuer-name: placeholder-issuer
              csi.cert-manager.io/common-name: envoy-gateway-extension-server
              csi.cert-manager.io/dns-names: "network-services-operator-envoy-gateway-extension-server.network-services-operator-system.svc,network-services-operator-envoy-gateway-extension-server.network-services-operator-system.svc.cluster.local"
              csi.cert-manager.io/key-usages: server auth
              csi.cert-manager.io/fs-group: "65532"
        # Placeholder CA bundle (key ca.crt) — an overlay must patch the ConfigMap name.
        - name: tls-ca
          configMap:
            name: placeholder-ca-bundle
            items:
              - key: ca.crt
                path: ca.crt

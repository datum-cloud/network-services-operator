apiVersion: apps/v1
kind: Deployment
metadata:
  name: envoy-gateway-extension-server
  namespace: system
  labels:
    app.kubernetes.io/name: network-services-operator
    app.kubernetes.io/component: extension-server
    app.kubernetes.io/managed-by: kustomize
spec:
  # HA requirement: minimum 2 replicas. Every replica serves (no leader election).
  replicas: 2
  # maxUnavailable: 0 ensures serving capacity never drops below 2 during a rolling
  # update. A failing new image can never reduce replicas to 0 (failOpen:false + 0
  # serving = fleet-wide xDS freeze for all gateway updates).
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: network-services-operator
      app.kubernetes.io/component: extension-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: network-services-operator
        app.kubernetes.io/component: extension-server
    spec:
      serviceAccountName: envoy-gateway-extension-server
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      # Topology spread: require replicas on distinct nodes so a single node failure
      # cannot take both replicas offline at once. With failOpen:false, total replicas=0
      # freezes all gateway xDS updates fleet-wide.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/component: extension-server
      containers:
        - name: envoy-gateway-extension-server
          # Same image as NSO manager — single binary, subcommand selects role.
          image: ghcr.io/datum-cloud/network-services-operator:latest
          imagePullPolicy: IfNotPresent
          command:
            - /network-services
            - envoy-gateway-extension-server
          args:
            - --grpc-addr=:5005
            - --health-addr=:8080
            - --tls-cert=/tls/tls.crt
            - --tls-key=/tls/tls.key
            - --tls-client-ca=/tls-ca/ca.crt
          ports:
            - name: grpc
              containerPort: 5005
              protocol: TCP
            - name: health
              containerPort: 8080
              protocol: TCP
          # startupProbe: gates liveness during initial informer cache sync.
          # Allows up to 5 minutes (60 × 5s) for WaitForCacheSync before liveness
          # begins. The gRPC server does not start until the cache is warm.
          startupProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            # No initialDelaySeconds — startupProbe handles the startup window.
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: "1"
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          # preStop: 5s sleep gives kube-proxy/iptables time to propagate endpoint
          # removal before the gRPC server starts draining. Without this, new EG
          # connections arriving after GracefulStop begins get a TCP reset instead
          # of a retriable gRPC UNAVAILABLE.
          lifecycle:
            preStop:
              sleep:
                seconds: 5
          volumeMounts:
            - name: tls
              mountPath: /tls
              readOnly: true
            - name: tls-ca
              mountPath: /tls-ca
              readOnly: true
      # terminationGracePeriodSeconds: 20 = 5s preStop sleep + 15s for GracefulStop
      # to drain in-flight RPCs before SIGKILL.
      terminationGracePeriodSeconds: 20
      volumes:
        # Server TLS cert + key via cert-manager CSI driver (datum-control-plane ClusterIssuer).
        # Prerequisites: CSI driver installed; datum-control-plane ClusterIssuer exists;
        # namespace labelled for trust-manager trust bundle injection:
        #   infra.datum.net/inject-datum-control-plane-trust-bundle: ""
        #
        # dns-names assume config/default namePrefix + namespace. Infra overlays deploying in
        # a different namespace MUST patch this volume's volumeAttributes accordingly.
        - name: tls
          csi:
            driver: csi.cert-manager.io
            readOnly: true
            volumeAttributes:
              csi.cert-manager.io/issuer-kind: ClusterIssuer
              csi.cert-manager.io/issuer-name: datum-control-plane
              csi.cert-manager.io/common-name: envoy-gateway-extension-server
              csi.cert-manager.io/dns-names: "network-services-operator-envoy-gateway-extension-server.network-services-operator-system.svc,network-services-operator-envoy-gateway-extension-server.network-services-operator-system.svc.cluster.local"
              csi.cert-manager.io/key-usages: server auth
              csi.cert-manager.io/fs-group: "65532"

        # CA trust bundle — trust-manager injects datum-control-plane-trust-bundle into
        # this ConfigMap. Key 'ca.crt' used by extension server to verify EG's client cert.
        - name: tls-ca
          configMap:
            name: datum-control-plane-trust-bundle
            items:
              - key: ca.crt
                path: ca.crt

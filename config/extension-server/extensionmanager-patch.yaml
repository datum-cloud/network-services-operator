# EnvoyGateway extensionManager registration patch for NSO's production extension server.
#
# This is a JSON-merge patch applied to the 'envoy-gateway' HelmRelease in the
# infra repo (datum-cloud/infra). Apply with:
#
#   kubectl patch helmrelease envoy-gateway -n flux-system --type merge \
#     --patch-file config/extension-server/extensionmanager-patch.yaml
#
# Then restart EG to pick up the new config:
#   kubectl -n envoy-gateway-system rollout restart deploy/envoy-gateway
#
# ============================================================
# Open item (a): clientCertificateRef / certificateRef namespace
# ============================================================
# Finding: EG v1.8.1 uses a cluster-scoped Kubernetes client (ClusterRole-level
# Secret access) to load extension manager TLS configuration. The SecretObjectReference
# in ExtensionTLS supports an explicit 'namespace' field and EG's extension manager
# loader resolves it cross-namespace. Unlike Gateway API ingress TLS which requires
# ReferenceGrant for cross-namespace Secrets, the extensionManager TLS fields are
# EG-internal and bypass ReferenceGrant. Cross-namespace references to NSO's namespace
# ARE supported in EG v1.8.1.
#
# RECOMMENDATION: Use NSO namespace for both certificateRef and clientCertificateRef
# (implemented below). This avoids Secret sync between namespaces and keeps all PKI
# in NSO's namespace.
#
# Fallback (if cross-ns fails in cluster testing): Create cert-manager Certificate
# resources in envoy-gateway-system backed by a ClusterIssuer (CA in cert-manager
# namespace). Update the namespace fields below to envoy-gateway-system.
#
# ============================================================
# Open item (b): NSO deployed namespace / Service FQDN
# ============================================================
# Assumed from config/default/kustomization.yaml:
#   namespace: network-services-operator-system
#   namePrefix: network-services-operator-
#   → Service name: network-services-operator-extension-server
#   → FQDN: network-services-operator-extension-server.network-services-operator-system.svc.cluster.local
#
# CONFIRM before applying: verify that the NSO namespace and namePrefix match the
# actual FluxCD/production deployment. The infra repo overlays may use different values.
#
# ============================================================
# Conflict C2 note (from implementation plan §5)
# ============================================================
# The perf seed deploys in envoy-gateway-system. Production MUST deploy in NSO's
# namespace. The FQDN below targets NSO's namespace, NOT envoy-gateway-system.
#
# ============================================================
# Correctness notes (from perf seed validation)
# ============================================================
# 1. Hook enum 'Translation' (NOT 'Listener' — rejected by EG config validator).
# 2. translation.listener.includeAll + translation.route.includeAll MUST be true.
#    Without them the hook receives clusters+secrets only; all WAF listener
#    mutations and per-route mutations are silently dropped.
# 3. failOpen: false — fail-closed. An extension server error blocks the xDS update
#    (Envoy holds last-known-good config). This prevents WAF-stripped configs from
#    being pushed. Two replicas + retry policy mitigate the availability cost.
spec:
  values:
    config:
      envoyGateway:
        extensionManager:
          service:
            fqdn:
              # Open item (b): confirm service name and namespace match production.
              # Pattern: <namePrefix><service-name>.<namespace>.svc.cluster.local
              hostname: network-services-operator-extension-server.network-services-operator-system.svc.cluster.local
              port: 5005
            tls:
              certificateRef:
                # CA cert Secret: EG uses tls.crt from this Secret to verify the
                # extension server's presented TLS certificate.
                # Issued by cert-manager Certificate 'extension-server-ca' in NSO namespace.
                name: extension-server-ca
                namespace: network-services-operator-system   # open-item (a): cross-ns, see above
              clientCertificateRef:
                # EG mTLS client cert: EG presents this when connecting to the
                # extension server. Extension server verifies it using ca.crt from
                # its mounted extension-server-tls Secret.
                name: extension-server-eg-client-tls
                namespace: network-services-operator-system   # open-item (a): cross-ns, see above
            # Retry policy: bounded retries with exponential backoff on transient
            # gRPC failures. A rolling restart of one replica should not fail a build.
            # Defaults (EG v1.8.1) match these values; listed explicitly for clarity.
            retry:
              maxAttempts: 4
              initialBackoff: 100ms
              maxBackoff: 1s
              backoffMultiplier: 2
              retryableStatusCodes:
                - UNAVAILABLE
          hooks:
            xdsTranslator:
              post:
                - Translation   # enables PostTranslateModify; no other hooks registered
              translation:
                listener:
                  includeAll: true   # MANDATORY — required for WAF listener filter injection
                route:
                  includeAll: true   # MANDATORY — required for per-route WAF config + datum-gateway metadata
                cluster:
                  includeAll: true
                secret:
                  includeAll: true
          # Fail-closed: extension errors block the xDS update; Envoy holds
          # last-known-good config. Prevents WAF/Connector mutations from being
          # silently dropped on extension server errors.
          failOpen: false

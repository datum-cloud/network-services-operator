# NetworkPolicy — restricts gRPC ingress (:5005) to Envoy Gateway control-plane namespaces.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  labels:
    app.kubernetes.io/name: network-services-operator
    app.kubernetes.io/component: envoy-gateway-extension-server
    app.kubernetes.io/managed-by: kustomize
  name: allow-envoy-gateway-extension-server-grpc-traffic
  namespace: system
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: envoy-gateway-extension-server
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: envoy-gateway-system
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: datum-downstream-gateway
      ports:
        - port: 5005
          protocol: TCP
    # Health probe port (8080): no selector — kubelet IPs are outside pod CIDR.
    - ports:
        - port: 8080
          protocol: TCP

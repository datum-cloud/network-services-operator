apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  labels:
    app.kubernetes.io/name: network-services-operator
    app.kubernetes.io/component: extension-server
    app.kubernetes.io/managed-by: kustomize
  name: extension-server-pdb
  namespace: system
spec:
  # minAvailable: 1 prevents simultaneous eviction of both replicas.
  # With failOpen:false, zero serving replicas freezes ALL gateway xDS updates fleet-wide.
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: extension-server

---
# ClusterRole for the extension server's ServiceAccount.
#
# The extension server runs at the edge and reads the local cluster only via the pod's
# in-cluster config (this SA token). Every replica serves (no leader election).
# BuildPolicyIndex runs per hook call against the warm in-memory cache.
#
# Types consumed:
#   - namespaces: builds the downstream-ns → upstream-ns reverse map
#     (fmt.Sprintf("ns-%s", namespace.UID), mappednamespace.go:82)
#   - trafficprotectionpolicies: WAF/Coraza directives per gateway/route
#   - httpproxies: Connector backend endpoint + rule index per HTTPProxy
#   - connectors: online/offline state via Connector.Status.Conditions[Ready]
#
# Read-only subset of config/rbac/role.yaml. No write verbs.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: network-services-operator
    app.kubernetes.io/component: extension-server
    app.kubernetes.io/managed-by: kustomize
  name: envoy-gateway-extension-server-role
rules:
  # Namespace list/watch: builds downstream NS → upstream NS reverse map.
  - apiGroups:
      - ""
    resources:
      - namespaces
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - networking.datumapis.com
    resources:
      - trafficprotectionpolicies
      - httpproxies
      - connectors
    verbs:
      - get
      - list
      - watch
  # Status subresources: ConnectorInfo.Online reads Connector.Status.Conditions[Ready].
  - apiGroups:
      - networking.datumapis.com
    resources:
      - trafficprotectionpolicies/status
      - httpproxies/status
      - connectors/status
    verbs:
      - get

# ActivityPolicy for ConnectorClass resources (networking.datumapis.com).
# Defines how ConnectorClass CRUD operations appear in activity timelines.
#
# ConnectorClass is a cluster-scoped resource defining connector types available
# on the platform. It has no user-facing display name field — audit.objectRef.name
# is used as the display string. All rules exclude system users to suppress noise.
apiVersion: activity.miloapis.com/v1alpha1
kind: ActivityPolicy
metadata:
  name: networking.datumapis.com-connectorclass
spec:
  resource:
    apiGroup: networking.datumapis.com
    kind: ConnectorClass

  auditRules:
    # ConnectorClass creation with spec available
    - name: create
      match: "!audit.user.username.startsWith('system:') && audit.verb == 'create' && has(audit.requestObject.spec)"
      summary: "{{ actor }} created connector class {{ link(audit.objectRef.name, audit.objectRef) }}"

    # ConnectorClass creation fallback (no spec)
    - name: create-fallback
      match: "!audit.user.username.startsWith('system:') && audit.verb == 'create'"
      summary: "{{ actor }} created {{ link('a connector class', audit.objectRef) }}"

    # ConnectorClass deletion with responseObject.spec available (response contains the deleted resource)
    - name: delete
      match: "!audit.user.username.startsWith('system:') && audit.verb == 'delete' && has(audit.responseObject.spec)"
      summary: "{{ actor }} deleted connector class {{ audit.objectRef.name }}"

    # ConnectorClass deletion fallback (no spec on response)
    - name: delete-fallback
      match: "!audit.user.username.startsWith('system:') && audit.verb == 'delete'"
      summary: "{{ actor }} deleted a connector class"

    # ConnectorClass update with spec available - excludes status subresource
    - name: update
      match: "!audit.user.username.startsWith('system:') && audit.verb in ['update', 'patch'] && !has(audit.objectRef.subresource) && has(audit.requestObject.spec)"
      summary: "{{ actor }} updated connector class {{ link(audit.objectRef.name, audit.objectRef) }}"

    # ConnectorClass update fallback (no spec)
    - name: update-fallback
      match: "!audit.user.username.startsWith('system:') && audit.verb in ['update', 'patch'] && !has(audit.objectRef.subresource)"
      summary: "{{ actor }} updated {{ link('a connector class', audit.objectRef) }}"

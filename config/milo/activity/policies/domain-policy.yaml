# ActivityPolicy for Domain resources (networking.datumapis.com).
# Defines how Domain CRUD operations appear in activity timelines.
#
# Domains have a spec.domainName field (e.g. "example.com") that is far more
# recognisable to users than the auto-generated resource name. This is used as
# the display string, mirroring the dns-operator DNSZone pattern.
# All rules exclude system users to suppress controller reconciliation noise.
apiVersion: activity.miloapis.com/v1alpha1
kind: ActivityPolicy
metadata:
  name: networking.datumapis.com-domain
spec:
  resource:
    apiGroup: networking.datumapis.com
    kind: Domain

  auditRules:
    # Domain creation with spec.domainName available - use domain name as display text
    - name: create
      match: "!audit.user.username.startsWith('system:') && audit.verb == 'create' && has(audit.requestObject.spec)"
      summary: "{{ actor }} created domain {{ link(audit.requestObject.spec.domainName, audit.objectRef) }}"

    # Domain creation fallback (no spec)
    - name: create-fallback
      match: "!audit.user.username.startsWith('system:') && audit.verb == 'create'"
      summary: "{{ actor }} created {{ link('a domain', audit.objectRef) }}"

    # Domain deletion with responseObject.spec available (response contains the deleted resource)
    - name: delete
      match: "!audit.user.username.startsWith('system:') && audit.verb == 'delete' && has(audit.responseObject.spec)"
      summary: "{{ actor }} deleted domain {{ audit.responseObject.spec.domainName }}"

    # Domain deletion fallback (no spec on response)
    - name: delete-fallback
      match: "!audit.user.username.startsWith('system:') && audit.verb == 'delete'"
      summary: "{{ actor }} deleted a domain"

    # Domain update with spec available - excludes status subresource
    - name: update
      match: "!audit.user.username.startsWith('system:') && audit.verb in ['update', 'patch'] && !has(audit.objectRef.subresource) && has(audit.requestObject.spec)"
      summary: "{{ actor }} updated domain {{ link(audit.requestObject.spec.domainName, audit.objectRef) }}"

    # Domain update fallback (no spec)
    - name: update-fallback
      match: "!audit.user.username.startsWith('system:') && audit.verb in ['update', 'patch'] && !has(audit.objectRef.subresource)"
      summary: "{{ actor }} updated {{ link('a domain', audit.objectRef) }}"

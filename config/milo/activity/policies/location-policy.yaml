# ActivityPolicy for Location resources (networking.datumapis.com).
# Defines how Location CRUD operations appear in activity timelines.
#
# Locations represent network points of presence. They have no user-facing display
# name field in their spec, so audit.objectRef.name is used as the display string.
# All rules exclude system users to suppress controller reconciliation noise.
apiVersion: activity.miloapis.com/v1alpha1
kind: ActivityPolicy
metadata:
  name: networking.datumapis.com-location
spec:
  resource:
    apiGroup: networking.datumapis.com
    kind: Location

  auditRules:
    # Location creation with spec available
    - name: create
      match: "!audit.user.username.startsWith('system:') && audit.verb == 'create' && has(audit.requestObject.spec)"
      summary: "{{ actor }} created location {{ link(audit.objectRef.name, audit.objectRef) }}"

    # Location creation fallback (no spec)
    - name: create-fallback
      match: "!audit.user.username.startsWith('system:') && audit.verb == 'create'"
      summary: "{{ actor }} created {{ link('a location', audit.objectRef) }}"

    # Location deletion with responseObject.spec available (response contains the deleted resource)
    - name: delete
      match: "!audit.user.username.startsWith('system:') && audit.verb == 'delete' && has(audit.responseObject.spec)"
      summary: "{{ actor }} deleted location {{ audit.objectRef.name }}"

    # Location deletion fallback (no spec on response)
    - name: delete-fallback
      match: "!audit.user.username.startsWith('system:') && audit.verb == 'delete'"
      summary: "{{ actor }} deleted a location"

    # Location update with spec available - excludes status subresource
    - name: update
      match: "!audit.user.username.startsWith('system:') && audit.verb in ['update', 'patch'] && !has(audit.objectRef.subresource) && has(audit.requestObject.spec)"
      summary: "{{ actor }} updated location {{ link(audit.objectRef.name, audit.objectRef) }}"

    # Location update fallback (no spec)
    - name: update-fallback
      match: "!audit.user.username.startsWith('system:') && audit.verb in ['update', 'patch'] && !has(audit.objectRef.subresource)"
      summary: "{{ actor }} updated {{ link('a location', audit.objectRef) }}"

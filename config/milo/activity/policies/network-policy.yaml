# ActivityPolicy for Network resources (networking.datumapis.com).
# Defines how Network CRUD operations appear in activity timelines.
#
# Networks have no user-facing display name beyond the resource name,
# so audit.objectRef.name is used as the display string in link() calls.
# All rules exclude system users to suppress controller reconciliation noise.
apiVersion: activity.miloapis.com/v1alpha1
kind: ActivityPolicy
metadata:
  name: networking.datumapis.com-network
spec:
  resource:
    apiGroup: networking.datumapis.com
    kind: Network

  auditRules:
    # Network creation with spec available
    - name: create
      match: "!audit.user.username.startsWith('system:') && audit.verb == 'create' && has(audit.requestObject.spec)"
      summary: "{{ actor }} created network {{ link(audit.objectRef.name, audit.objectRef) }}"

    # Network creation fallback (no spec)
    - name: create-fallback
      match: "!audit.user.username.startsWith('system:') && audit.verb == 'create'"
      summary: "{{ actor }} created {{ link('a network', audit.objectRef) }}"

    # Network deletion with responseObject.spec available (response contains the deleted resource)
    - name: delete
      match: "!audit.user.username.startsWith('system:') && audit.verb == 'delete' && has(audit.responseObject.spec)"
      summary: "{{ actor }} deleted network {{ audit.objectRef.name }}"

    # Network deletion fallback (no spec on response)
    - name: delete-fallback
      match: "!audit.user.username.startsWith('system:') && audit.verb == 'delete'"
      summary: "{{ actor }} deleted a network"

    # Network update with spec available - excludes status subresource
    - name: update
      match: "!audit.user.username.startsWith('system:') && audit.verb in ['update', 'patch'] && !has(audit.objectRef.subresource) && has(audit.requestObject.spec)"
      summary: "{{ actor }} updated network {{ link(audit.objectRef.name, audit.objectRef) }}"

    # Network update fallback (no spec)
    - name: update-fallback
      match: "!audit.user.username.startsWith('system:') && audit.verb in ['update', 'patch'] && !has(audit.objectRef.subresource)"
      summary: "{{ actor }} updated {{ link('a network', audit.objectRef) }}"

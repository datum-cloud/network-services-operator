# ActivityPolicy for NetworkBinding resources (networking.datumapis.com).
# Defines how NetworkBinding CRUD operations appear in activity timelines.
#
# NetworkBindings attach networks to other resources and have no user-facing
# display name beyond the resource name — audit.objectRef.name is used as the
# display string. All rules exclude system users to suppress reconciliation noise.
apiVersion: activity.miloapis.com/v1alpha1
kind: ActivityPolicy
metadata:
  name: networking.datumapis.com-networkbinding
spec:
  resource:
    apiGroup: networking.datumapis.com
    kind: NetworkBinding

  auditRules:
    # NetworkBinding creation with spec available
    - name: create
      match: "!audit.user.username.startsWith('system:') && audit.verb == 'create' && has(audit.requestObject.spec)"
      summary: "{{ actor }} created network binding {{ link(audit.objectRef.name, audit.objectRef) }}"

    # NetworkBinding creation fallback (no spec)
    - name: create-fallback
      match: "!audit.user.username.startsWith('system:') && audit.verb == 'create'"
      summary: "{{ actor }} created {{ link('a network binding', audit.objectRef) }}"

    # NetworkBinding deletion with responseObject.spec available (response contains the deleted resource)
    - name: delete
      match: "!audit.user.username.startsWith('system:') && audit.verb == 'delete' && has(audit.responseObject.spec)"
      summary: "{{ actor }} deleted network binding {{ audit.objectRef.name }}"

    # NetworkBinding deletion fallback (no spec on response)
    - name: delete-fallback
      match: "!audit.user.username.startsWith('system:') && audit.verb == 'delete'"
      summary: "{{ actor }} deleted a network binding"

    # NetworkBinding update with spec available - excludes status subresource
    - name: update
      match: "!audit.user.username.startsWith('system:') && audit.verb in ['update', 'patch'] && !has(audit.objectRef.subresource) && has(audit.requestObject.spec)"
      summary: "{{ actor }} updated network binding {{ link(audit.objectRef.name, audit.objectRef) }}"

    # NetworkBinding update fallback (no spec)
    - name: update-fallback
      match: "!audit.user.username.startsWith('system:') && audit.verb in ['update', 'patch'] && !has(audit.objectRef.subresource)"
      summary: "{{ actor }} updated {{ link('a network binding', audit.objectRef) }}"

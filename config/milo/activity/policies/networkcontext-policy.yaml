# ActivityPolicy for NetworkContext resources (networking.datumapis.com).
# Defines how NetworkContext CRUD operations appear in activity timelines.
#
# NetworkContexts associate a network with a location and have no standalone
# display name — audit.objectRef.name is used as the display string.
# All rules exclude system users to suppress controller reconciliation noise.
apiVersion: activity.miloapis.com/v1alpha1
kind: ActivityPolicy
metadata:
  name: networking.datumapis.com-networkcontext
spec:
  resource:
    apiGroup: networking.datumapis.com
    kind: NetworkContext

  auditRules:
    # NetworkContext creation with spec available
    - name: create
      match: "!audit.user.username.startsWith('system:') && audit.verb == 'create' && has(audit.requestObject.spec)"
      summary: "{{ actor }} created network context {{ link(audit.objectRef.name, audit.objectRef) }}"

    # NetworkContext creation fallback (no spec)
    - name: create-fallback
      match: "!audit.user.username.startsWith('system:') && audit.verb == 'create'"
      summary: "{{ actor }} created {{ link('a network context', audit.objectRef) }}"

    # NetworkContext deletion with responseObject.spec available (response contains the deleted resource)
    - name: delete
      match: "!audit.user.username.startsWith('system:') && audit.verb == 'delete' && has(audit.responseObject.spec)"
      summary: "{{ actor }} deleted network context {{ audit.objectRef.name }}"

    # NetworkContext deletion fallback (no spec on response)
    - name: delete-fallback
      match: "!audit.user.username.startsWith('system:') && audit.verb == 'delete'"
      summary: "{{ actor }} deleted a network context"

    # NetworkContext update with spec available - excludes status subresource
    - name: update
      match: "!audit.user.username.startsWith('system:') && audit.verb in ['update', 'patch'] && !has(audit.objectRef.subresource) && has(audit.requestObject.spec)"
      summary: "{{ actor }} updated network context {{ link(audit.objectRef.name, audit.objectRef) }}"

    # NetworkContext update fallback (no spec)
    - name: update-fallback
      match: "!audit.user.username.startsWith('system:') && audit.verb in ['update', 'patch'] && !has(audit.objectRef.subresource)"
      summary: "{{ actor }} updated {{ link('a network context', audit.objectRef) }}"

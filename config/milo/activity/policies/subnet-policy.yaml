# ActivityPolicy for Subnet resources (networking.datumapis.com).
# Defines how Subnet CRUD operations appear in activity timelines.
#
# Subnets don't have a user-facing display name in their spec; the resource name
# is used as the display string. All rules exclude system users to suppress
# controller reconciliation noise.
apiVersion: activity.miloapis.com/v1alpha1
kind: ActivityPolicy
metadata:
  name: networking.datumapis.com-subnet
spec:
  resource:
    apiGroup: networking.datumapis.com
    kind: Subnet

  auditRules:
    # Subnet creation with spec available
    - name: create
      match: "!audit.user.username.startsWith('system:') && audit.verb == 'create' && has(audit.requestObject.spec)"
      summary: "{{ actor }} created subnet {{ link(audit.objectRef.name, audit.objectRef) }}"

    # Subnet creation fallback (no spec)
    - name: create-fallback
      match: "!audit.user.username.startsWith('system:') && audit.verb == 'create'"
      summary: "{{ actor }} created {{ link('a subnet', audit.objectRef) }}"

    # Subnet deletion with responseObject.spec available (response contains the deleted resource)
    - name: delete
      match: "!audit.user.username.startsWith('system:') && audit.verb == 'delete' && has(audit.responseObject.spec)"
      summary: "{{ actor }} deleted subnet {{ audit.objectRef.name }}"

    # Subnet deletion fallback (no spec on response)
    - name: delete-fallback
      match: "!audit.user.username.startsWith('system:') && audit.verb == 'delete'"
      summary: "{{ actor }} deleted a subnet"

    # Subnet update with spec available - excludes status subresource
    - name: update
      match: "!audit.user.username.startsWith('system:') && audit.verb in ['update', 'patch'] && !has(audit.objectRef.subresource) && has(audit.requestObject.spec)"
      summary: "{{ actor }} updated subnet {{ link(audit.objectRef.name, audit.objectRef) }}"

    # Subnet update fallback (no spec)
    - name: update-fallback
      match: "!audit.user.username.startsWith('system:') && audit.verb in ['update', 'patch'] && !has(audit.objectRef.subresource)"
      summary: "{{ actor }} updated {{ link('a subnet', audit.objectRef) }}"

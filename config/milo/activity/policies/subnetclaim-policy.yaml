# ActivityPolicy for SubnetClaim resources (networking.datumapis.com).
# Defines how SubnetClaim CRUD operations appear in activity timelines.
#
# SubnetClaims request allocation of subnets from a pool and have no user-facing
# display name — audit.objectRef.name is used as the display string.
# All rules exclude system users to suppress controller reconciliation noise.
apiVersion: activity.miloapis.com/v1alpha1
kind: ActivityPolicy
metadata:
  name: networking.datumapis.com-subnetclaim
spec:
  resource:
    apiGroup: networking.datumapis.com
    kind: SubnetClaim

  auditRules:
    # SubnetClaim creation with spec available
    - name: create
      match: "!audit.user.username.startsWith('system:') && audit.verb == 'create' && has(audit.requestObject.spec)"
      summary: "{{ actor }} created subnet claim {{ link(audit.objectRef.name, audit.objectRef) }}"

    # SubnetClaim creation fallback (no spec)
    - name: create-fallback
      match: "!audit.user.username.startsWith('system:') && audit.verb == 'create'"
      summary: "{{ actor }} created {{ link('a subnet claim', audit.objectRef) }}"

    # SubnetClaim deletion with responseObject.spec available (response contains the deleted resource)
    - name: delete
      match: "!audit.user.username.startsWith('system:') && audit.verb == 'delete' && has(audit.responseObject.spec)"
      summary: "{{ actor }} deleted subnet claim {{ audit.objectRef.name }}"

    # SubnetClaim deletion fallback (no spec on response)
    - name: delete-fallback
      match: "!audit.user.username.startsWith('system:') && audit.verb == 'delete'"
      summary: "{{ actor }} deleted a subnet claim"

    # SubnetClaim update with spec available - excludes status subresource
    - name: update
      match: "!audit.user.username.startsWith('system:') && audit.verb in ['update', 'patch'] && !has(audit.objectRef.subresource) && has(audit.requestObject.spec)"
      summary: "{{ actor }} updated subnet claim {{ link(audit.objectRef.name, audit.objectRef) }}"

    # SubnetClaim update fallback (no spec)
    - name: update-fallback
      match: "!audit.user.username.startsWith('system:') && audit.verb in ['update', 'patch'] && !has(audit.objectRef.subresource)"
      summary: "{{ actor }} updated {{ link('a subnet claim', audit.objectRef) }}"

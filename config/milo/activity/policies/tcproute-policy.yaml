# ActivityPolicy for TCPRoute resources (gateway.networking.k8s.io).
# Defines how TCPRoute CRUD operations appear in activity timelines.
#
# TCPRoute resources route TCP traffic and have no user-facing display name field
# (spec.rules reference backend services). The resource name is used as the display
# string. All rules exclude system users to suppress reconciliation noise.
apiVersion: activity.miloapis.com/v1alpha1
kind: ActivityPolicy
metadata:
  name: gateway.networking.k8s.io-tcproute
spec:
  resource:
    apiGroup: gateway.networking.k8s.io
    kind: TCPRoute

  auditRules:
    # TCPRoute creation with spec available
    - name: create
      match: "!audit.user.username.startsWith('system:') && audit.verb == 'create' && has(audit.requestObject.spec)"
      summary: "{{ actor }} created TCP route {{ link(audit.objectRef.name, audit.objectRef) }}"

    # TCPRoute creation fallback (no spec)
    - name: create-fallback
      match: "!audit.user.username.startsWith('system:') && audit.verb == 'create'"
      summary: "{{ actor }} created {{ link('a TCP route', audit.objectRef) }}"

    # TCPRoute deletion with responseObject.spec available (response contains the deleted resource)
    - name: delete
      match: "!audit.user.username.startsWith('system:') && audit.verb == 'delete' && has(audit.responseObject.spec)"
      summary: "{{ actor }} deleted TCP route {{ audit.objectRef.name }}"

    # TCPRoute deletion fallback (no spec on response)
    - name: delete-fallback
      match: "!audit.user.username.startsWith('system:') && audit.verb == 'delete'"
      summary: "{{ actor }} deleted a TCP route"

    # TCPRoute update with spec available - excludes status subresource
    - name: update
      match: "!audit.user.username.startsWith('system:') && audit.verb in ['update', 'patch'] && !has(audit.objectRef.subresource) && has(audit.requestObject.spec)"
      summary: "{{ actor }} updated TCP route {{ link(audit.objectRef.name, audit.objectRef) }}"

    # TCPRoute update fallback (no spec)
    - name: update-fallback
      match: "!audit.user.username.startsWith('system:') && audit.verb in ['update', 'patch'] && !has(audit.objectRef.subresource)"
      summary: "{{ actor }} updated {{ link('a TCP route', audit.objectRef) }}"

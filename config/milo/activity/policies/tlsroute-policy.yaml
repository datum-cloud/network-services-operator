# ActivityPolicy for TLSRoute resources (gateway.networking.k8s.io).
# Defines how TLSRoute CRUD operations appear in activity timelines.
#
# TLSRoute resources route TLS traffic based on SNI and have no user-facing
# display name field (spec.rules reference backend services). The resource name
# is used as the display string. All rules exclude system users to suppress noise.
apiVersion: activity.miloapis.com/v1alpha1
kind: ActivityPolicy
metadata:
  name: gateway.networking.k8s.io-tlsroute
spec:
  resource:
    apiGroup: gateway.networking.k8s.io
    kind: TLSRoute

  auditRules:
    # TLSRoute creation with spec available
    - name: create
      match: "!audit.user.username.startsWith('system:') && audit.verb == 'create' && has(audit.requestObject.spec)"
      summary: "{{ actor }} created TLS route {{ link(audit.objectRef.name, audit.objectRef) }}"

    # TLSRoute creation fallback (no spec)
    - name: create-fallback
      match: "!audit.user.username.startsWith('system:') && audit.verb == 'create'"
      summary: "{{ actor }} created {{ link('a TLS route', audit.objectRef) }}"

    # TLSRoute deletion with responseObject.spec available (response contains the deleted resource)
    - name: delete
      match: "!audit.user.username.startsWith('system:') && audit.verb == 'delete' && has(audit.responseObject.spec)"
      summary: "{{ actor }} deleted TLS route {{ audit.objectRef.name }}"

    # TLSRoute deletion fallback (no spec on response)
    - name: delete-fallback
      match: "!audit.user.username.startsWith('system:') && audit.verb == 'delete'"
      summary: "{{ actor }} deleted a TLS route"

    # TLSRoute update with spec available - excludes status subresource
    - name: update
      match: "!audit.user.username.startsWith('system:') && audit.verb in ['update', 'patch'] && !has(audit.objectRef.subresource) && has(audit.requestObject.spec)"
      summary: "{{ actor }} updated TLS route {{ link(audit.objectRef.name, audit.objectRef) }}"

    # TLSRoute update fallback (no spec)
    - name: update-fallback
      match: "!audit.user.username.startsWith('system:') && audit.verb in ['update', 'patch'] && !has(audit.objectRef.subresource)"
      summary: "{{ actor }} updated {{ link('a TLS route', audit.objectRef) }}"

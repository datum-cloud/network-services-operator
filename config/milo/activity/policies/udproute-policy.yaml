# ActivityPolicy for UDPRoute resources (gateway.networking.k8s.io).
# Defines how UDPRoute CRUD operations appear in activity timelines.
#
# UDPRoute resources route UDP traffic and have no user-facing display name field
# (spec.rules reference backend services). The resource name is used as the display
# string. All rules exclude system users to suppress reconciliation noise.
apiVersion: activity.miloapis.com/v1alpha1
kind: ActivityPolicy
metadata:
  name: gateway.networking.k8s.io-udproute
spec:
  resource:
    apiGroup: gateway.networking.k8s.io
    kind: UDPRoute

  auditRules:
    # UDPRoute creation with spec available
    - name: create
      match: "!audit.user.username.startsWith('system:') && audit.verb == 'create' && has(audit.requestObject.spec)"
      summary: "{{ actor }} created UDP route {{ link(audit.objectRef.name, audit.objectRef) }}"

    # UDPRoute creation fallback (no spec)
    - name: create-fallback
      match: "!audit.user.username.startsWith('system:') && audit.verb == 'create'"
      summary: "{{ actor }} created {{ link('a UDP route', audit.objectRef) }}"

    # UDPRoute deletion with responseObject.spec available (response contains the deleted resource)
    - name: delete
      match: "!audit.user.username.startsWith('system:') && audit.verb == 'delete' && has(audit.responseObject.spec)"
      summary: "{{ actor }} deleted UDP route {{ audit.objectRef.name }}"

    # UDPRoute deletion fallback (no spec on response)
    - name: delete-fallback
      match: "!audit.user.username.startsWith('system:') && audit.verb == 'delete'"
      summary: "{{ actor }} deleted a UDP route"

    # UDPRoute update with spec available - excludes status subresource
    - name: update
      match: "!audit.user.username.startsWith('system:') && audit.verb in ['update', 'patch'] && !has(audit.objectRef.subresource) && has(audit.requestObject.spec)"
      summary: "{{ actor }} updated UDP route {{ link(audit.objectRef.name, audit.objectRef) }}"

    # UDPRoute update fallback (no spec)
    - name: update-fallback
      match: "!audit.user.username.startsWith('system:') && audit.verb in ['update', 'patch'] && !has(audit.objectRef.subresource)"
      summary: "{{ actor }} updated {{ link('a UDP route', audit.objectRef) }}"

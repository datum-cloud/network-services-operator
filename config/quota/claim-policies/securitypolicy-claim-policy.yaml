apiVersion: quota.miloapis.com/v1alpha1
kind: ClaimCreationPolicy
metadata:
  name: project-securitypolicy-claim-policy
  labels:
    app.kubernetes.io/name: network-services-operator
    app.kubernetes.io/component: quota-system
spec:
  trigger:
    resource:
      apiVersion: gateway.envoyproxy.io/v1alpha1
      kind: SecurityPolicy
  target:
    resourceClaimTemplate:
      metadata:
        name: "securitypolicy-{{ trigger.metadata.name }}"
        namespace: "{{requestInfo.namespace}}"
        labels:
          app.kubernetes.io/name: network-services-operator
          app.kubernetes.io/component: quota-system
        annotations:
          kubernetes.io/description: "Automatic quota claim for SecurityPolicy creation"
      spec:
        requests:
          - resourceType: gateway.envoyproxy.io/securitypolicies
            amount: 1

apiVersion: quota.miloapis.com/v1alpha1
kind: ClaimCreationPolicy
metadata:
  name: project-trafficprotectionpolicy-claim-policy
  labels:
    app.kubernetes.io/name: network-services-operator
    app.kubernetes.io/component: quota-system
spec:
  trigger:
    resource:
      apiVersion: networking.datumapis.com/v1alpha
      kind: TrafficProtectionPolicy
  target:
    resourceClaimTemplate:
      metadata:
        name: "trafficprotectionpolicy-{{ trigger.metadata.name }}"
        namespace: "{{requestInfo.namespace}}"
        labels:
          app.kubernetes.io/name: network-services-operator
          app.kubernetes.io/component: quota-system
        annotations:
          kubernetes.io/description: "Automatic quota claim for TrafficProtectionPolicy creation"
      spec:
        requests:
          - resourceType: networking.datumapis.com/trafficprotectionpolicies
            amount: 1

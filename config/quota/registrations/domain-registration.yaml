apiVersion: quota.miloapis.com/v1alpha1
kind: ResourceRegistration
metadata:
  name: domains-per-project
  labels:
    app.kubernetes.io/name: network-services-operator
    app.kubernetes.io/component: quota-system
    services.miloapis.com/owner: networking.datumapis.com
  annotations:
    kubernetes.io/display-name: "Domains"
    kubernetes.io/description: "Maximum number of domains that can be created within a project"
spec:
  consumerType:
    apiGroup: resourcemanager.miloapis.com
    kind: Project

  type: Entity

  resourceType: networking.datumapis.com/domains

  description: "Maximum number of domains that can be created within a project"

  baseUnit: domain
  displayUnit: domains
  unitConversionFactor: 1

  claimingResources:
    - apiGroup: networking.datumapis.com
      kind: Domain

apiVersion: quota.miloapis.com/v1alpha1
kind: ResourceRegistration
metadata:
  name: gateways-per-project
  labels:
    app.kubernetes.io/name: network-services-operator
    app.kubernetes.io/component: quota-system
spec:
  consumerType:
    apiGroup: resourcemanager.miloapis.com
    kind: Project

  type: Entity

  resourceType: gateway.networking.k8s.io/gateways

  description: "Maximum number of gateways that can be created within a project"

  baseUnit: gateway
  displayUnit: gateways
  unitConversionFactor: 1

  claimingResources:
    - apiGroup: gateway.networking.k8s.io
      kind: Gateway

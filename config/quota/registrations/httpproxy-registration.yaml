apiVersion: quota.miloapis.com/v1alpha1
kind: ResourceRegistration
metadata:
  name: httpproxies-per-project
  labels:
    app.kubernetes.io/name: network-services-operator
    app.kubernetes.io/component: quota-system
spec:
  consumerType:
    apiGroup: resourcemanager.miloapis.com
    kind: Project

  type: Entity

  resourceType: networking.datumapis.com/httpproxies

  description: "Maximum number of HTTP proxies that can be created within a project"

  baseUnit: proxy
  displayUnit: proxies
  unitConversionFactor: 1

  claimingResources:
    - apiGroup: networking.datumapis.com
      kind: HTTPProxy

apiVersion: quota.miloapis.com/v1alpha1
kind: ResourceRegistration
metadata:
  name: httproutefilters-per-project
  labels:
    app.kubernetes.io/name: network-services-operator
    app.kubernetes.io/component: quota-system
spec:
  consumerType:
    apiGroup: resourcemanager.miloapis.com
    kind: Project

  type: Entity

  resourceType: gateway.envoyproxy.io/httproutefilters

  description: "Maximum number of HTTP route filters that can be created within a project"

  baseUnit: filter
  displayUnit: filters
  unitConversionFactor: 1

  claimingResources:
    - apiGroup: gateway.envoyproxy.io
      kind: HTTPRouteFilter

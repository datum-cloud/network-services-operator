apiVersion: quota.miloapis.com/v1alpha1
kind: ResourceRegistration
metadata:
  name: networkpolicies-per-project
  labels:
    app.kubernetes.io/name: network-services-operator
    app.kubernetes.io/component: quota-system
spec:
  consumerType:
    apiGroup: resourcemanager.miloapis.com
    kind: Project

  type: Entity

  resourceType: networking.datumapis.com/networkpolicies

  description: "Maximum number of network policies that can be created within a project"

  baseUnit: policy
  displayUnit: policies
  unitConversionFactor: 1

  claimingResources:
    - apiGroup: networking.datumapis.com
      kind: NetworkPolicy

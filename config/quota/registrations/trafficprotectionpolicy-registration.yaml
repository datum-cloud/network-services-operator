apiVersion: quota.miloapis.com/v1alpha1
kind: ResourceRegistration
metadata:
  name: trafficprotectionpolicies-per-project
  labels:
    app.kubernetes.io/name: network-services-operator
    app.kubernetes.io/component: quota-system
spec:
  consumerType:
    apiGroup: resourcemanager.miloapis.com
    kind: Project

  type: Entity

  resourceType: networking.datumapis.com/trafficprotectionpolicies

  description: "Maximum number of traffic protection policies that can be created within a project"

  baseUnit: policy
  displayUnit: policies
  unitConversionFactor: 1

  claimingResources:
    - apiGroup: networking.datumapis.com
      kind: TrafficProtectionPolicy

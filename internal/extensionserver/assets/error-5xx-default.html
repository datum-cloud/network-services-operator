<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>Temporarily unavailable</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1.5rem;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(120% 120% at 50% 0%, #14151a 0%, #0a0b0d 60%, #060708 100%);
      color: #e8eaed;
    }
    .card {
      width: 100%;
      max-width: 30rem;
      text-align: center;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 2.5rem 2rem;
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.04) inset, 0 20px 60px rgba(0, 0, 0, 0.45);
    }
    .badge {
      display: inline-block;
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #9aa3b2;
      margin-bottom: 1.25rem;
    }
    .dot {
      display: inline-block;
      width: 0.5rem;
      height: 0.5rem;
      border-radius: 50%;
      background: #f0a23c;
      margin-right: 0.5rem;
      vertical-align: middle;
      box-shadow: 0 0 12px rgba(240, 162, 60, 0.7);
    }
    h1 {
      font-size: 1.5rem;
      line-height: 1.3;
      margin: 0 0 0.75rem;
      font-weight: 600;
    }
    p {
      margin: 0 auto;
      max-width: 24rem;
      color: #aab2c0;
      font-size: 0.95rem;
      line-height: 1.55;
    }
    .meta {
      margin-top: 1.75rem;
      font-size: 0.78rem;
      color: #6b7280;
    }
    .code {
      font-variant-numeric: tabular-nums;
      color: #8b93a1;
    }
  </style>
</head>
<body>
  <main class="card">
    <span class="badge"><span class="dot"></span>Datum Cloud</span>
    <h1>This site is temporarily unavailable</h1>
    <p>
      The site you're trying to reach can't be served right now. This is usually
      temporary &mdash; please try again in a few moments.
    </p>
    <div class="meta">Error <span class="code">%RESPONSE_CODE%</span> &middot; served by the Datum edge</div>
  </main>
</body>
</html>

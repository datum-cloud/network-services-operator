# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: network-crud
spec:
  cluster: nso-standard
  steps:
    - name: Create Network
      try:
        - create:
            resource:
              apiVersion: networking.datumapis.com/v1alpha
              kind: Network
              metadata:
                name: (to_lower(concat('e2e-net-', replace_all(time_now(), ':', '-'))))
                namespace: default
              spec:
                ipam:
                  mode: Auto
            outputs:
              - name: NETWORK_NAME
                value: (@.metadata.name)

    - name: Assert Network is Ready
      try:
        - assert:
            timeout: 2m
            resource:
              apiVersion: networking.datumapis.com/v1alpha
              kind: Network
              metadata:
                name: ($NETWORK_NAME)
                namespace: default
              status:
                (conditions[?type == 'Ready'][0].status): 'True'

    - name: Delete Network
      try:
        - script:
            timeout: 1m
            env:
              - name: NETWORK_NAME
                value: ($NETWORK_NAME)
            content: |
              set -e
              kubectl delete network.networking.datumapis.com $NETWORK_NAME -n default --wait=true --timeout=60s
              echo "Network $NETWORK_NAME deleted"
